name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake libasound2-dev libgl1-mesa-dev libglfw3-dev xorg-dev

      - name: Install macOS dependencies
        if: runner.os == 'macOS'
        run: brew install cmake glfw

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build
        run: cargo build --release --verbose

      - name: Run tests
        run: cargo test --verbose

      - uses: actions/upload-artifact@v4
        with:
          name: gta7-${{ runner.os }}
          path: target/release/gta7
          retention-days: 1

  release:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Download Linux binary
        uses: actions/download-artifact@v4
        with:
          name: gta7-Linux
          path: dist/gta7-linux

      - name: Download macOS binary
        uses: actions/download-artifact@v4
        with:
          name: gta7-macOS
          path: dist/gta7-macos

      - name: Download Windows binary
        uses: actions/download-artifact@v4
        with:
          name: gta7-Windows
          path: dist/gta7-windows

      - name: Prepare release assets
        run: |
          mkdir binaries
          for d in dist/*; do
            target="binaries/$(basename $d)"
            [ -f "$d/gta7.exe" ] && cp "$d/gta7.exe" "$target.exe" || true
            [ -f "$d/gta7" ] && cp "$d/gta7" "$target"
          done

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: latest
          tag_name: latest
          files: binaries/*
          prerelease: true
          overwrite: true
          generate_release_notes: true
